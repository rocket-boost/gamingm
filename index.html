<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Под Давлением — Crash Game</title>
    <style>
        body {
            background: #18191c;
            color: #f5f5f5;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #23242a;
            border-radius: 18px;
            box-shadow: 0 4px 32px #000a;
            padding: 32px 24px 24px 24px;
            max-width: 400px;
            width: 100%;
            margin: 24px auto;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .balance {
            text-align: center;
            margin-bottom: 18px;
            font-size: 1.1rem;
            color: #ffd700;
        }
        .bet-input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 16px;
            font-size: 1.1rem;
            background: #1a1b1f;
            color: #fff;
        }
        .game-area {
            background: #222327;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 18px;
            position: relative;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }
        .press {
            width: 80px;
            height: 40px;
            background: linear-gradient(180deg, #888 60%, #444 100%);
            border-radius: 8px 8px 12px 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            z-index: 2;
            box-shadow: 0 2px 12px #0008;
        }
        .gold-object {
            width: 60px;
            height: 30px;
            background: linear-gradient(90deg, #ffd700 60%, #bfa100 100%);
            border-radius: 12px 12px 18px 18px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 24px;
            z-index: 1;
            box-shadow: 0 2px 16px #ffd70088;
        }
        .multiplier {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ffae;
            letter-spacing: 1px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #00ffae 60%, #007a5a 100%);
            color: #18191c;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        .btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }
        .result {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .container {
                padding: 18px 6px 18px 6px;
                max-width: 98vw;
            }
            .game-area {
                height: 160px;
            }
            .press {
                width: 60px;
                height: 28px;
            }
            .gold-object {
                width: 40px;
                height: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Под Давлением</h1>
        <div class="balance" id="balance">Баланс: ...</div>
        <input type="number" min="1" max="100000" value="100" class="bet-input" id="bet" placeholder="Ставка (монеты)">
        <div class="game-area" id="game-area">
            <div class="press" id="press"></div>
            <div class="gold-object" id="gold"></div>
        </div>
        <div class="multiplier" id="multiplier">x1.00</div>
        <button class="btn" id="start-btn">Старт</button>
        <button class="btn" id="cashout-btn" style="display:none; background:linear-gradient(90deg,#ffd700 60%,#bfa100 100%);color:#18191c;">Забрать</button>
        <div class="result" id="result"></div>
    </div>
    <audio id="creak" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9e7e7b.mp3"></audio>
    <script>
        // Telegram WebApp integration
        let tg = window.Telegram?.WebApp || {};
        let user_id = null;
        let balance = 0;
        let crashPoint = 0;
        let multiplier = 1.00;
        let interval = null;
        let gameActive = false;
        let cashout = false;
        let bet = 0;
        const press = document.getElementById('press');
        const gold = document.getElementById('gold');
        const multiplierDiv = document.getElementById('multiplier');
        const startBtn = document.getElementById('start-btn');
        const cashoutBtn = document.getElementById('cashout-btn');
        const resultDiv = document.getElementById('result');
        const betInput = document.getElementById('bet');
        const balanceDiv = document.getElementById('balance');
        const creak = document.getElementById('creak');

        function getUserId() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                return tg.initDataUnsafe.user.id;
            }
            // fallback for testing
            return 123456789;
        }
        async function fetchBalance() {
            // In production, fetch from backend
            // Here, just set placeholder
            balanceDiv.textContent = `Баланс: ...`;
            try {
                const resp = await fetch(`/balance?tg_id=${user_id}`);
                const data = await resp.json();
                balance = data.balance;
                balanceDiv.textContent = `Баланс: ${balance} монет`;
            } catch {
                balanceDiv.textContent = `Баланс: ...`;
            }
        }
        async function updateBalance(newBalance) {
            balance = newBalance;
            balanceDiv.textContent = `Баланс: ${balance} монет`;
        }
        function playCreak() {
            creak.currentTime = 0;
            creak.play();
        }
        function vibrate(ms) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            } else if (window.navigator.vibrate) {
                window.navigator.vibrate(ms);
            }
        }
        function resetGame() {
            multiplier = 1.00;
            multiplierDiv.textContent = 'x1.00';
            press.style.top = '0';
            gold.style.bottom = '24px';
            resultDiv.textContent = '';
            startBtn.style.display = '';
            cashoutBtn.style.display = 'none';
            betInput.disabled = false;
            gameActive = false;
            cashout = false;
        }
        function animatePress(mult) {
            // Move press down as multiplier increases
            let maxTop = 140;
            let percent = Math.min((mult - 1) / (crashPoint - 1), 1);
            let top = percent * maxTop;
            press.style.top = `${top}px`;
        }
        async function startGame() {
            bet = parseInt(betInput.value);
            if (!bet || bet < 1 || bet > balance) {
                resultDiv.textContent = 'Некорректная ставка';
                return;
            }
            crashPoint = +(Math.random() * 8.9 + 1.1).toFixed(2); // 1.1 - 10.0
            multiplier = 1.00;
            gameActive = true;
            cashout = false;
            startBtn.style.display = 'none';
            cashoutBtn.style.display = '';
            betInput.disabled = true;
            resultDiv.textContent = '';
            playCreak();
            vibrate(30);
            interval = setInterval(() => {
                if (!gameActive) return;
                multiplier = +(multiplier + 0.05).toFixed(2);
                multiplierDiv.textContent = `x${multiplier.toFixed(2)}`;
                animatePress(multiplier);
                playCreak();
                vibrate(10);
                if (multiplier >= crashPoint) {
                    endGame(false);
                }
            }, 80);
        }
        async function endGame(won) {
            clearInterval(interval);
            gameActive = false;
            cashoutBtn.style.display = 'none';
            startBtn.style.display = '';
            betInput.disabled = false;
            let resultText = '';
            let finalMultiplier = multiplier;
            if (!won) {
                multiplierDiv.textContent = `x${crashPoint.toFixed(2)} (CRASH!)`;
                resultText = `Объект раздавлен! Вы проиграли ${bet} монет.`;
                gold.style.bottom = '8px';
                vibrate(100);
            } else {
                resultText = `Вы забрали: ${Math.floor(bet * multiplier)} монет!`;
                vibrate(60);
            }
            resultDiv.textContent = resultText;
            // Send result to backend for validation and balance update
            try {
                const resp = await fetch('/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tg_id: user_id,
                        bet: bet,
                        multiplier: won ? finalMultiplier : crashPoint,
                        crash: crashPoint,
                        cashout: won
                    })
                });
                const data = await resp.json();
                if (data.balance !== undefined) {
                    updateBalance(data.balance);
                }
                if (data.error) {
                    resultDiv.textContent = data.error;
                }
            } catch {
                resultDiv.textContent = 'Ошибка соединения с сервером';
            }
        }
        startBtn.onclick = startGame;
        cashoutBtn.onclick = () => {
            if (!gameActive) return;
            cashout = true;
            endGame(true);
        };
        // Initialization
        window.onload = () => {
            user_id = getUserId();
            fetchBalance();
            resetGame();
        };
        // Responsive resize
        window.onresize = () => {
            animatePress(multiplier);
        };
    </script>
</body>
</html>

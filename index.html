<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blind Fill Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; margin: 0; touch-action: none; }
        #glass-container { position: relative; width: 140px; height: 240px; border: 4px solid #fff; margin: 40px auto; border-top: none; border-radius: 0 0 20px 20px; background: rgba(255,255,255,0.05); overflow: hidden; }
        #water { position: absolute; bottom: 0; width: 100%; background: #3498db; box-shadow: 0 0 15px #3498db; }
        #blind-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10; display: none; align-items: center; justify-content: center; font-weight: bold; }
        #pour-btn { width: 220px; height: 80px; font-size: 24px; border-radius: 40px; border: none; background: #2ecc71; color: white; font-weight: bold; cursor: pointer; }
        #pour-btn:disabled { background: #555; cursor: not-allowed; }
        .status { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Blind Fill PvP</h2>
    <p class="status">Удерживай кнопку. Отпустишь — раунд окончен!</p>
    
    <div id="glass-container">
        <div id="blind-overlay">СЛУШАЙ...</div>
        <div id="water" style="height: 0%;"></div>
    </div>

    <button id="pour-btn">НАЧАТЬ НАЛИВ</button>
    <p id="result"></p>
    <button onclick="location.reload()" style="background: none; border: 1px solid #555; color: #555; padding: 5px 10px; border-radius: 5px; margin-top: 20px;">Заново</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let waterLevel = 0;
        let isGameOver = false;
        let flowRate = Math.random() * 0.5 + 0.3; // Рандомный напор
        let audioCtx, mainOsc, bubbleOsc, gainNode;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
        }

        function startPouring() {
            // Основной тон резонанса стакана
            mainOsc = audioCtx.createOscillator();
            mainOsc.type = 'sine';
            mainOsc.frequency.setValueAtTime(200, audioCtx.currentTime); 
            
            // "Бульканье" (низкий гул)
            bubbleOsc = audioCtx.createOscillator();
            bubbleOsc.type = 'triangle';
            bubbleOsc.frequency.setValueAtTime(50, audioCtx.currentTime);

            const lfo = audioCtx.createOscillator();
            lfo.type = 'square';
            lfo.frequency.setValueAtTime(10, audioCtx.currentTime); // 10 бульков в сек
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 20;
            lfo.connect(lfoGain);
            lfoGain.connect(bubbleOsc.frequency);

            mainOsc.connect(gainNode);
            bubbleOsc.connect(gainNode);
            
            mainOsc.start();
            bubbleOsc.start();
            lfo.start();
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        }

        const btn = document.getElementById('pour-btn');
        const water = document.getElementById('water');
        const overlay = document.getElementById('blind-overlay');

        btn.addEventListener('pointerdown', (e) => {
            if (isGameOver) return;
            initAudio();
            startPouring();
            overlay.style.display = 'flex';
            
            const interval = setInterval(() => {
                if (!btn.matches(':active')) {
                    clearInterval(interval);
                    stopGame();
                    return;
                }
                waterLevel += flowRate;
                
                // Имитация изменения звука при заполнении
                // Частота растет: чем меньше воздуха, тем выше звук
                let freq = 200 + Math.pow(waterLevel, 1.5) * 5;
                mainOsc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                if (waterLevel > 90) tg.HapticFeedback.impactOccurred('light');
                if (waterLevel > 115) {
                    clearInterval(interval);
                    stopGame();
                }
                water.style.height = (waterLevel > 100 ? 100 : waterLevel) + '%';
            }, 50);
        });

        function stopGame() {
            if (isGameOver) return;
            isGameOver = true;
            btn.disabled = true;
            overlay.style.display = 'none';

            // Плавное затухание звука
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            setTimeout(() => {
                if(mainOsc) mainOsc.stop();
                if(bubbleOsc) bubbleOsc.stop();
            }, 100);

            const final = waterLevel.toFixed(1);
            let msg = "";
            if (waterLevel > 100) {
                msg = `🔴 ПЕРЕЛИВ! (${final}%)`;
                tg.HapticFeedback.notificationOccurred('error');
            } else if (waterLevel > 96) {
                msg = `💎 ЧЕМПИОН! (${final}%)`;
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                msg = `Результат: ${final}%`;
            }
            document.getElementById('result').innerText = msg;

            // Отправляем ID админа (8754454109) и результат
            tg.sendData(JSON.stringify({score: final, admin_id: "8754454109"}));
        }
    </script>
</body>
</html>

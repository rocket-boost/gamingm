<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blind Fill Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; overflow: hidden; }
        #glass-container { position: relative; width: 150px; height: 250px; border: 4px solid #fff; margin: 50px auto; border-top: none; border-radius: 0 0 20px 20px; overflow: hidden; }
        #water { position: absolute; bottom: 0; width: 100%; background: #3498db; transition: height 0.1s linear; }
        #blind-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 10; align-items: center; justify-content: center; font-size: 20px; }
        #pour-btn { width: 200px; height: 80px; font-size: 24px; font-weight: bold; border-radius: 40px; border: none; background: #2ecc71; color: white; cursor: pointer; touch-action: none; }
        #pour-btn:active { background: #27ae60; transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>Blind Fill PvP</h1>
    <p>Цель: Наполни стакан на 95-99%</p>
    
    <div id="glass-container">
        <div id="blind-overlay">СЛУШАЙ ЗВУК...</div>
        <div id="water" style="height: 0%;"></div>
    </div>

    <button id="pour-btn">НАЛИТЬ</button>
    <p id="result"></p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let waterLevel = 0;
        let isPouring = false;
        let flowRate = Math.random() * 0.5 + 0.2; // Случайная скорость
        let interval;

        const water = document.getElementById('water');
        const overlay = document.getElementById('blind-overlay');
        const btn = document.getElementById('pour-btn');

        btn.addEventListener('pointerdown', () => {
            isPouring = true;
            overlay.style.display = 'flex';
            interval = setInterval(() => {
                waterLevel += flowRate;
                if (waterLevel > 110) stopGame(); // Перелив
                water.style.height = waterLevel + '%';
            }, 50);
        });

        btn.addEventListener('pointerup', stopGame);

        function stopGame() {
            if (!isPouring) return;
            isPouring = false;
            clearInterval(interval);
            overlay.style.display = 'none';
            
            const final = waterLevel.toFixed(1);
            let msg = "";
            
            if (waterLevel > 100) msg = `ПЕРЕЛИВ! (${final}%)`;
            else if (waterLevel > 95) msg = `ЛЕГЕНДАРНО! (${final}%)`;
            else msg = `Результат: ${final}%`;
            
            document.getElementById('result').innerText = msg;
            
            // Отправляем результат обратно в бота
            tg.sendData(JSON.stringify({score: waterLevel, admin_id: "8754454109"}));
        }
    </script>
</body>
</html>
